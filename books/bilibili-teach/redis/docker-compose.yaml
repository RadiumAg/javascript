version: '3.8'

services:
  # Redis 主节点
  redis-master:
    image: redis:7-alpine
    container_name: redis-master
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass master123
    volumes:
      - master-data:/data
    networks:
      - redis-network

  # Redis 从节点 1
  redis-slave1:
    image: redis:7-alpine
    container_name: redis-slave1
    ports:
      - "6380:6379"
    command: >
      redis-server
      --appendonly yes
      --requirepass slave123
      --masterauth master123
      --replicaof redis-master 6379
    volumes:
      - slave1-data:/data
    depends_on:
      - redis-master
    networks:
      - redis-network

  # Redis 从节点 2
  redis-slave2:
    image: redis:7-alpine
    container_name: redis-slave2
    ports:
      - "6381:6379"
    command: >
      redis-server
      --appendonly yes
      --requirepass slave123
      --masterauth master123
      --replicaof redis-master 6379
    volumes:
      - slave2-data:/data
    depends_on:
      - redis-master
    networks:
      - redis-network

  # Redis Sentinel (监控和故障转移)
  redis-sentinel1:
    image: redis:7-alpine
    container_name: redis-sentinel1
    ports:
      - "26379:26379"
    command: >
      sh -c "
      echo 'port 26379' > /tmp/sentinel.conf &&
      echo 'sentinel monitor mymaster redis-master 6379 2' >> /tmp/sentinel.conf &&
      echo 'sentinel auth-pass mymaster master123' >> /tmp/sentinel.conf &&
      echo 'sentinel down-after-milliseconds mymaster 5000' >> /tmp/sentinel.conf &&
      echo 'sentinel failover-timeout mymaster 10000' >> /tmp/sentinel.conf &&
      echo 'sentinel parallel-syncs mymaster 1' >> /tmp/sentinel.conf &&
      redis-server /tmp/sentinel.conf --sentinel
      "
    depends_on:
      - redis-master
    networks:
      - redis-network

  redis-sentinel2:
    image: redis:7-alpine
    container_name: redis-sentinel2
    ports:
      - "26380:26379"
    command: >
      sh -c "
      echo 'port 26379' > /tmp/sentinel.conf &&
      echo 'sentinel monitor mymaster redis-master 6379 2' >> /tmp/sentinel.conf &&
      echo 'sentinel auth-pass mymaster master123' >> /tmp/sentinel.conf &&
      echo 'sentinel down-after-milliseconds mymaster 5000' >> /tmp/sentinel.conf &&
      echo 'sentinel failover-timeout mymaster 10000' >> /tmp/sentinel.conf &&
      echo 'sentinel parallel-syncs mymaster 1' >> /tmp/sentinel.conf &&
      redis-server /tmp/sentinel.conf --sentinel
      "
    depends_on:
      - redis-master
    networks:
      - redis-network

  redis-sentinel3:
    image: redis:7-alpine
    container_name: redis-sentinel3
    ports:
      - "26381:26379"
    command: >
      sh -c "
      echo 'port 26379' > /tmp/sentinel.conf &&
      echo 'sentinel monitor mymaster redis-master 6379 2' >> /tmp/sentinel.conf &&
      echo 'sentinel auth-pass mymaster master123' >> /tmp/sentinel.conf &&
      echo 'sentinel down-after-milliseconds mymaster 5000' >> /tmp/sentinel.conf &&
      echo 'sentinel failover-timeout mymaster 10000' >> /tmp/sentinel.conf &&
      echo 'sentinel parallel-syncs mymaster 1' >> /tmp/sentinel.conf &&
      redis-server /tmp/sentinel.conf --sentinel
      "
    depends_on:
      - redis-master
    networks:
      - redis-network

volumes:
  master-data:
  slave1-data:
  slave2-data:

networks:
  redis-network:
    driver: bridge
