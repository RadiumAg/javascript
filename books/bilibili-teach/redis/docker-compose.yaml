version: '3.8'

services:
  redis-master:
    image: redis:7-alpine
    container_name: redis-master
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - master-data:/data
    networks:
      - redis-network

  redis-slave1:
    image: redis:7-alpine
    container_name: redis-slave1
    ports:
      - "6380:6379"
    command: redis-server --appendonly yes
    volumes:
      - slave1-data:/data
    networks:
      - redis-network

  redis-slave2:
    image: redis:7-alpine
    container_name: redis-slave2
    ports:
      - "6381:6379"
    command: redis-server --appendonly yes
    volumes:
      - slave2-data:/data
    networks:
      - redis-network

volumes:
  master-data:
  slave1-data:
  slave2-data:

networks:
  redis-network:
    driver: bridge
